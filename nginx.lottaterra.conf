server {
  listen 80;
  server_name lottaterra.com www.lottaterra.com;

  root /var/www/lottaterra.com/dist;
  index index.html;

  location /assets/ {
    try_files $uri =404;
    access_log off;
    expires 30d;
    add_header Cache-Control "public, immutable";
  }

  location /images/ {
    try_files $uri =404;
    access_log off;
    expires 30d;
  }

  location = /favicon.svg {
    try_files $uri =404;
  }

  location = /icons.svg {
    try_files $uri =404;
  }

  location = /robots.txt {
    try_files $uri =404;
  }

  location = /sitemap.xml {
    try_files $uri =404;
  }

  location /api/ {
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location = /healthz {
    proxy_pass http://127.0.0.1:3000/healthz;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
